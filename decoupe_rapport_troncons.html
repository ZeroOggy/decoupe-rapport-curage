<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Découpe rapport de curage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root{
    --bg:#f5f7fa;
    --card:#ffffff;
    --line:#e3e8ef;
    --line-2:#eef1f6;
    --text:#1f2733;
    --muted:#6b7785;
    --accent:#2563eb;
    --accent-soft:#eff4ff;
    --ok:#0f9d58;
    --warn:#c0561a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
  .wrap{max-width:760px;margin:0 auto;padding:48px 20px 80px}

  h1{font-size:1.5rem;font-weight:700;margin:0 0 6px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:.95rem;margin:0 0 30px}

  /* zone de dépôt */
  #drop{display:block;cursor:pointer;background:var(--card);border:2px dashed var(--line);
    border-radius:14px;padding:46px 24px;text-align:center;transition:.18s}
  #drop:hover{border-color:#c7d0dd}
  #drop.over{border-color:var(--accent);background:var(--accent-soft)}
  #drop.busy{cursor:progress;border-style:solid;border-color:var(--line)}
  .ico{width:44px;height:44px;margin:0 auto 14px;border-radius:11px;background:var(--accent-soft);
    display:grid;place-items:center}
  .ico svg{width:22px;height:22px;stroke:var(--accent);fill:none;stroke-width:1.9}
  .big{font-size:1.05rem;font-weight:600}
  .small{color:var(--muted);font-size:.86rem;margin-top:6px}
  input[type=file]{display:none}

  .opts{margin:16px 2px 0;font-size:.86rem;color:var(--muted)}
  .opts label{display:inline-flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
  .opts input{accent-color:var(--accent);width:16px;height:16px}
  .opts code{font-family:"JetBrains Mono",monospace;background:var(--line-2);
    color:var(--text);padding:1px 6px;border-radius:5px;font-size:.8rem}

  /* progression */
  .progress{margin-top:24px;display:none}
  .progress.on{display:block}
  .ptrack{height:6px;border-radius:6px;background:var(--line);overflow:hidden}
  .pfill{height:100%;width:0;border-radius:6px;background:var(--accent);transition:width .25s}
  .pmsg{font-family:"JetBrains Mono",monospace;font-size:.8rem;color:var(--muted);margin-top:9px}
  .pmsg b{color:var(--accent)}
  .err{color:var(--warn)}

  /* résultat */
  .result{margin-top:30px;display:none}
  .result.on{display:block}
  .topline{display:flex;align-items:center;justify-content:space-between;gap:16px;
    flex-wrap:wrap;margin-bottom:18px}
  .count{font-size:1.05rem;font-weight:600}
  .count span{color:var(--accent)}
  .actions{display:flex;gap:10px}
  .btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:10px;
    font-family:"Inter";font-size:.92rem;font-weight:600;cursor:pointer;padding:11px 18px;
    text-decoration:none;transition:.15s}
  .btn.dl{background:var(--accent);color:#fff}
  .btn.dl:hover{background:#1d4fd7}
  .btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--muted);font-weight:500}
  .btn.ghost:hover{color:var(--text);border-color:#c7d0dd}

  .list{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .row{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:14px;
    padding:12px 16px;border-bottom:1px solid var(--line-2)}
  .row:last-child{border-bottom:none}
  .no{font-family:"JetBrains Mono",monospace;font-size:.78rem;font-weight:500;color:var(--accent);
    background:var(--accent-soft);border-radius:6px;padding:3px 9px;min-width:30px;text-align:center}
  .name{font-family:"JetBrains Mono",monospace;font-size:.85rem;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .name .ext{color:var(--muted)}
  .pg{font-family:"JetBrains Mono",monospace;font-size:.74rem;color:var(--muted);white-space:nowrap}

  footer{margin-top:34px;font-size:.8rem;color:var(--muted)}

  @media (max-width:560px){
    .row{grid-template-columns:auto 1fr}
    .pg{grid-column:2;text-align:left}
    .topline{flex-direction:column;align-items:flex-start}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <h1>Découpe de rapport de curage</h1>
  <p class="sub">Déposez le rapport complet : chaque tronçon est isolé avec ses photos, renommé, et regroupé dans un seul dossier ZIP.</p>

  <label id="drop" for="file">
    <span class="ico">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
    </span>
    <span class="big">Glissez le rapport PDF ici</span>
    <span class="small">ou cliquez pour parcourir — tout reste sur votre machine</span>
    <input type="file" id="file" accept="application/pdf">
  </label>

  <div class="progress" id="progress">
    <div class="ptrack"><div class="pfill" id="pfill"></div></div>
    <div class="pmsg" id="pmsg"></div>
  </div>

  <div class="result" id="result">
    <div class="topline">
      <div class="count" id="count"></div>
      <div class="actions" id="actions"></div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const drop=document.getElementById('drop'), fileEl=document.getElementById('file');
const progress=document.getElementById('progress'), pfill=document.getElementById('pfill'), pmsg=document.getElementById('pmsg');
const result=document.getElementById('result'), countEl=document.getElementById('count');
const actions=document.getElementById('actions'), listEl=document.getElementById('list'), footer=document.getElementById('footer');

function abbr(rue){
  rue=rue.replace(/^\s*Chemin\b/i,'Ch');
  rue=rue.replace(/^\s*Route\b/i,'Rte');
  rue=rue.replace(/^\s*Avenue\b/i,'Av');
  return rue;
}
function slug(s){return (s||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^A-Za-z0-9]+/g,'_').replace(/^_+|_+$/g,'');}

function analyse(text){
  const t=text.replace(/\s+/g,' ');let num=null,kind=null,date=null,rue=null,m;
  if(/Informations? g[eé]n[eé]rales?/.test(t)) return {num:null,kind:'skip',date:null,rue:null};
  if(m=t.match(/Inspection de tronçon\s*-\s*(\S+)/)){
    num=m[1];kind='insp';
    const d=t.match(/(\d{2})\.(\d{2})\.(\d{4})/); if(d)date=d[3]+d[2]+d[1];
    const r=t.match(/Rue\s+(.+?)\s+Fonction/); if(r)rue=r[1];
  }else if(m=t.match(/Inclinaison de tronçon\s*-\s*(\S+)/)){num=m[1];kind='incl';}
  else if(m=t.match(/Photos de tronçon\s*-\s*(\S+)/)){num=m[1];kind='photo';}
  return {num,kind,date,rue};
}
function setProgress(pct,msg){progress.classList.add('on');pfill.style.width=pct+'%';if(msg)pmsg.innerHTML=msg;}

drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');
  if(e.dataTransfer.files.length)handle(e.dataTransfer.files[0]);});
fileEl.addEventListener('change',e=>{if(e.target.files.length)handle(e.target.files[0]);});

async function handle(file){
  result.classList.remove('on');listEl.innerHTML='';actions.innerHTML='';footer.textContent='';
  if(file.type!=='application/pdf'&&!file.name.toLowerCase().endsWith('.pdf')){
    setProgress(0,'<span class="err">Ce fichier n\'est pas un PDF. Glissez un rapport .pdf.</span>');return;
  }
  drop.classList.add('busy');
  setProgress(4,'Lecture de <b>'+file.name+'</b>…');
  const buf=await file.arrayBuffer();

  let doc;
  try{doc=await pdfjsLib.getDocument({data:buf.slice(0)}).promise;}
  catch(err){drop.classList.remove('busy');setProgress(0,'<span class="err">PDF illisible : '+err.message+'</span>');return;}

  const N=doc.numPages, info=[];
  for(let i=1;i<=N;i++){
    const page=await doc.getPage(i);
    const tc=await page.getTextContent();
    info.push(analyse(tc.items.map(it=>it.str).join(' ')));
    setProgress(Math.round(i/N*55),'Analyse des pages… <b>'+i+'/'+N+'</b>');
  }

  const order=[],groups={},meta={};let current=null;
  info.forEach((pi,idx)=>{
    if(pi.kind==='skip')return;
    if(pi.num===null){if(current!==null)groups[current].push(idx);return;}
    if(pi.num!==current){current=pi.num;if(!groups[pi.num]){groups[pi.num]=[];order.push(pi.num);meta[pi.num]={};}}
    groups[pi.num].push(idx);
    if(pi.date&&!meta[pi.num].date)meta[pi.num].date=pi.date;
    if(pi.rue&&!meta[pi.num].rue)meta[pi.num].rue=pi.rue;
  });

  if(!order.length){drop.classList.remove('busy');
    setProgress(0,'<span class="err">Aucun tronçon détecté. Ce rapport a-t-il bien des pages « Inspection de tronçon - N » ?</span>');return;}

  const src=await PDFLib.PDFDocument.load(buf);
  const zip=new JSZip(),rows=[];

  for(let k=0;k<order.length;k++){
    const num=order[k],m=meta[num];
    const out=await PDFLib.PDFDocument.create();
    const idxs=groups[num];
    (await out.copyPages(src,idxs)).forEach(p=>out.addPage(p));
    const bytes=await out.save();
    const rue=slug(abbr(m.rue||'Rue'));
    const fname=(m.date||'0000')+'_'+rue+'_'+num+'.pdf';
    zip.file(fname,bytes);
    rows.push({fname,num,pages:idxs.map(i=>i+1)});
    setProgress(55+Math.round((k+1)/order.length*40),'Découpe des tronçons… <b>'+(k+1)+'/'+order.length+'</b>');
  }

  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const zipName=slug(file.name.replace(/\.pdf$/i,''))+'_decoupe.zip';

  drop.classList.remove('busy');
  setProgress(100,'Terminé.');

  countEl.innerHTML='<span>'+order.length+'</span> '+(order.length>1?'tronçons':'tronçon')+' · '+N+' pages';
  actions.innerHTML=
    '<a class="btn dl" href="'+url+'" download="'+zipName+'">'+
    '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>'+
    'Télécharger le ZIP</a>'+
    '<button class="btn ghost" onclick="location.reload()">Autre rapport</button>';

  listEl.innerHTML=rows.map(r=>{
    const pp=r.pages.length>6
      ? 'p.'+r.pages[0]+'–'+r.pages[r.pages.length-1]
      : 'p.'+r.pages.join(', ');
    const dot=r.fname.lastIndexOf('.');
    const nm=r.fname.slice(0,dot), ex=r.fname.slice(dot);
    return '<div class="row"><span class="no">'+r.num+'</span>'+
      '<span class="name">'+nm+'<span class="ext">'+ex+'</span></span>'+
      '<span class="pg">'+pp+'</span></div>';
  }).join('');
  footer.textContent='Détection basée sur les pages « Inspection de tronçon ». Pages de couverture et de légende ignorées.';
  result.classList.add('on');
}
</script>
</body>
</html>
