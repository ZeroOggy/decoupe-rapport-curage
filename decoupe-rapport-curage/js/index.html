<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Découpe rapport de curage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="wrap">

  <h1>Découpe de rapport de curage</h1>
  <p class="sub">Déposez le rapport complet : chaque tronçon est isolé avec ses photos, renommé, et regroupé dans un seul dossier ZIP.</p>

  <label id="drop" for="file">
    <span class="ico">
      <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
    </span>
    <span class="big">Glissez le rapport PDF ici</span>
    <span class="small">ou cliquez pour parcourir — tout reste sur votre machine</span>
    <input type="file" id="file" accept="application/pdf">
  </label>

  <div class="progress" id="progress">
    <div class="ptrack"><div class="pfill" id="pfill"></div></div>
    <div class="pmsg" id="pmsg"></div>
  </div>

  <div class="result" id="result">
    <div class="topline">
      <div class="count" id="count"></div>
      <div class="actions" id="actions"></div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <footer id="footer"></footer>
</div>

<script src="js/app.js"></script>
</body>
</html>
