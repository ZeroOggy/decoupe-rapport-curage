<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Découpe rapport de curage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="wrap">

  <h1>Découpe de rapport de curage</h1>
  <p class="sub">Déposez le rapport complet, et si vous en avez, les plans (<code style="font-family:'JetBrains Mono',monospace">Plan_67.pdf</code>…). Chaque tronçon est isolé avec ses photos, son plan ajouté à la fin, renommé, et regroupé dans un seul ZIP.</p>

  <div class="zones">
    <label class="drop" id="dropReport" for="fileReport">
      <span class="ico">
        <svg viewBox="0 0 24 24"><path d="M14 3v4a1 1 0 0 0 1 1h4M5 3h9l5 5v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>
      </span>
      <span class="big">Rapport de curage<span class="tag-req">requis</span></span>
      <span class="small" id="reportHint">Glissez le PDF du rapport complet</span>
      <input type="file" id="fileReport" accept="application/pdf">
      <div class="filelist" id="reportList"></div>
    </label>

    <label class="drop" id="dropPlans" for="filePlans">
      <span class="ico">
        <svg viewBox="0 0 24 24"><path d="M9 20l-5.5-3V4L9 7m0 13l6-3m-6 3V7m6 10l5.5-3V4L15 7m0 10V7m0 0L9 4"/></svg>
      </span>
      <span class="big">Plans<span class="tag-opt">optionnel</span></span>
      <span class="small" id="plansHint">Glissez les Plan_67.pdf, Plan_1-6_10-17.pdf…</span>
      <input type="file" id="filePlans" accept="application/pdf" multiple>
      <div class="filelist" id="plansList"></div>
    </label>
  </div>

  <div class="runbar">
    <button class="run" id="runBtn" disabled>Découper le rapport</button>
    <button class="clear" id="clearBtn" style="display:none">Tout effacer</button>
  </div>

  <div class="progress" id="progress">
    <div class="ptrack"><div class="pfill" id="pfill"></div></div>
    <div class="pmsg" id="pmsg"></div>
  </div>

  <div class="result" id="result">
    <div class="notice" id="notice"></div>
    <div class="topline">
      <div class="count" id="count"></div>
      <div class="actions" id="actions"></div>
    </div>
    <div class="list" id="list"></div>
  </div>

  <footer id="footer"></footer>
</div>

<script src="js/app.js"></script>
</body>
</html>
